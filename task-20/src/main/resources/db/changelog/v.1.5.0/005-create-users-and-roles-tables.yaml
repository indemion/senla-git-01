databaseChangeLog:
  - changeSet:
      id: 12
      author: indemion
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: INTEGER
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: username
                  type: VARCHAR
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
  - changeSet:
      id: 13
      author: indemion
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: INTEGER
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR
                  constraints:
                    nullable: false
                    unique: true
  - changeSet:
      id: 14
      author: indemion
      changes:
        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: user_id
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: INTEGER
                  constraints:
                    nullable: false
  - changeSet:
      id: 15
      author: indemion
      changes:
        addPrimaryKey:
          tableName: user_roles
          columnNames: user_id, role_id
          constraintName: pk_user_roles
